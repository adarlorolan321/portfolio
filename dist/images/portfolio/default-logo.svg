<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="2"/>
  
  <!-- Icon: Briefcase/Portfolio -->
  <g transform="translate(100, 100)">
    <!-- Briefcase body -->
    <rect x="-50" y="-20" width="100" height="60" rx="4" fill="#4a90e2" opacity="0.8"/>
    <!-- Briefcase handle -->
    <path d="M -30 -20 Q -30 -35 -20 -35 L 20 -35 Q 30 -35 30 -20" 
          stroke="#4a90e2" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Document lines inside -->
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    <line x1="-40" y1="10" x2="30" y2="10" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    <line x1="-40" y1="20" x2="35" y2="20" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
  </g>
</svg>

